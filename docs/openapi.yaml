openapi: 3.0.4
info:
  title: Task API
  version: 1.0.0
  description: REST API for managing task lists.

servers:
  - url: http://localhost:3000
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /health:
    get:
      summary: Check server health
      responses:
        '200':
          description: Server is running

  /api/auth/signup:
    post:
      summary: Create a user account
      requestBody:
        required: true
      responses:
        '201':
          description: Account created

  /api/auth/login:
    post:
      summary: Log in and receive a JWT
      requestBody:
        required: true
      responses:
        '200':
          description: Login successful

  /api/tasks:
    get:
      summary: List tasks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Task list returned
    post:
      summary: Create a task
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Task created

  /api/tasks/{id}:
    get:
      summary: Get a task by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task returned
    patch:
      summary: Update a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task updated
    delete:
      summary: Delete a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted